name = "praveen-portfolio"
main = "src/worker.js"
compatibility_date = "2024-12-16"

# ── Cloudflare Worker Configuration ──────────────────────────
# This handles the /api/chat proxy to keep API key secure
# Static files are served via Cloudflare Pages (separate deployment)

[env.production]
vars = { ENVIRONMENT = "production" }

# ── Environment Variables ────────────────────────────────────
# GEMINI_API_KEY: Set this in Cloudflare Dashboard → Workers → Secrets
# Do NOT put API keys in this file